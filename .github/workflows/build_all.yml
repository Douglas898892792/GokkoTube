name: Compila GokkoTube Multi-Piattaforma

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build per tutte le piattaforme
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output-name: linux
          - os: windows-latest
            output-name: windows
          - os: macos-latest
            output-name: apple

    steps:
    - uses: actions/checkout@v4

    - name: Configura Java (per Android/iOS)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configura Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Scarica pacchetti sorgente
      run: flutter pub get

    # Compila per Windows se il server è Windows
    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        flutter config --enable-windows-desktop
        flutter build windows

    # Compila per Linux se il server è Linux
    - name: Build Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update -y
        sudo apt-get install -y ninja-build libgtk-3-dev
        flutter config --enable-linux-desktop
        flutter build linux

    # Compila per iOS e macOS se il server è un Mac di GitHub
    - name: Build Apple (macOS & iOS)
      if: matrix.os == 'macos-latest'
      run: |
        flutter config --enable-macos-desktop
        flutter build macos --release
        flutter build ios --release --no-codesign
